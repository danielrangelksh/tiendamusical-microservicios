server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-Service
              uri: ${AUTH_SERVICE_URL:lb://AUTH-SERVICE}
              predicates:
                - Path=/auth/**

            - id: cliente
              uri: ${CLIENTE_SERVICE_URL:lb://CLIENTES}
              predicates:
                - Path=/api/clientes/**

            - id: reclamos
              uri: ${RECLAMOS_SERVICE_URL:lb://RECLAMOS}
              predicates:
                - Path=/api/reclamos/**

            - id: productos
              uri: ${PRODUCTOS_SERVICE_URL:lb://PRODUCTOS}
              predicates:
                - Path=/api/productos/**

            - id: servicioTecnico
              uri: ${SERVICIOTECNICO_SERVICE_URL:lb://SERVICIOTECNICO}
              predicates:
                - Path=/api/servicioTecnico/**

            - id: pedidos
              uri: ${PEDIDOS_SERVICE_URL:lb://PEDIDOS}
              predicates:
                - Path=/api/pedidos/**

            - id: devolucion
              uri: ${DEVOLUCION_SERVICE_URL:lb://DEVOLUCION}
              predicates:
                - Path=/api/devoluciones/**

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

jwt:
  secret: laClaveDeLaTiendaDeMusicaEstanLargaLoSuficiente

springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: http://localhost:8087/v3/api-docs
      - name: Cliente Service
        url: http://localhost:8081/v3/api-docs
      - name: Reclamos Service
        url: http://localhost:8082/v3/api-docs
      - name: Productos Service
        url: http://localhost:8083/v3/api-docs
      - name: ServicioTecnico Service
        url: http://localhost:8084/v3/api-docs
      - name: Pedidos Service
        url: http://localhost:8085/v3/api-docs
      - name: Devolución Service
        url: http://localhost:8086/v3/api-docs